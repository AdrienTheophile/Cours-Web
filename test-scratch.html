<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jeu Scratch</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #ffaa00; 
            font-size: 3em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .game-container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            
            width: 485px; 
            height: 402px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px dashed #ccc; 
            position: relative;
        }

        .game-container::before {
            content: "Colle ton iframe Scratch ici !";
            position: absolute;
            color: #999;
            font-size: 1.2em;
            z-index: 0;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            position: relative;
            z-index: 1; 
            background-color: transparent;
        }

        footer {
            margin-top: 30px;
            text-align: center;
        }

        .credits {
            font-size: 1.5em;
            color: #555;
            background-color: white;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .credits strong {
            color: #4a90e2;
        }
    </style>
</head>
<body>

    <header>
        <!-- Change le titre ci-dessous -->
        <h1>[Titre du Jeu]</h1>
    </header>

    <main class="game-container">
        <!-- COPIE ET COLLE TON CODE IFRAME SCRATCH JUSTE EN DESSOUS DE CETTE LIGNE -->
        <iframe src="" allowtransparency="true" width="485" height="402" frameborder="0" scrolling="no" allowfullscreen></iframe>
    </main>

    <footer>
        <!-- Modifie le nom ci-dessous -->
        <p class="credits">Jeu fait par : <strong>[Ton Prénom]</strong></p>
    </footer>

</body>
</html>
